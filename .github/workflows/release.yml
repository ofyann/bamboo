name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and release x86_64 binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-gnu/release/bamboo

      - name: Package binary
        id: package
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCHIVE="bamboo-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          cd target/x86_64-unknown-linux-gnu/release
          tar czf "${ARCHIVE}" bamboo
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "path=target/x86_64-unknown-linux-gnu/release/${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.path }}
          generate_release_notes: true
